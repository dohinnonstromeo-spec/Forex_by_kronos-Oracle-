<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inscription · Oracle Forex</title>
  <meta name="description" content="Creez votre compte Oracle Forex pour utiliser Kronos avec un historique personnel.">
  <link rel="stylesheet" href="/assets/styles-nTlncI0E.css">
  <link rel="stylesheet" href="/assets/oracle-extras.css">
</head>
<body class="oracle-page auth-page">
  <nav class="oracle-nav">
    <div class="oracle-nav-inner">
      <a href="/" class="oracle-brand">
        <span class="oracle-logo">O</span>
        <span>ORACLE <span class="text-amber-neon">FOREX</span></span>
      </a>
      <div class="oracle-links">
        <a href="/">Accueil</a>
        <a href="/tester-gratuitement">Tester gratuitement</a>
        <a href="/login">Connexion</a>
      </div>
    </div>
  </nav>

  <main class="oracle-main auth-main">
    <section class="auth-card">
      <p class="analysis-kicker">Nouveau compte</p>
      <h1 class="analysis-title">Inscription</h1>
      <p class="analysis-subtitle">Créez votre espace pour suivre vos analyses Kronos et préparer l'abonnement.</p>
      <form class="auth-form" data-auth-form="signup">
        <label>Nom complet<input name="name" type="text" autocomplete="name" required minlength="2"></label>
        <label>Email<input name="email" type="email" autocomplete="email" required></label>
        <label>Mot de passe<input name="password" type="password" autocomplete="new-password" required minlength="8"></label>
        <button class="analysis-submit" type="submit">Créer mon compte</button>
        <p class="auth-message" data-auth-message></p>
      </form>
      <p class="auth-switch">Déjà inscrit ? <a href="/login">Se connecter</a></p>
    </section>
  </main>

  <script src="/assets/auth.js" defer></script>
  <script src="/assets/oracle-chatbot.js" defer></script>
</body>
</html>
