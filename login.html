<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion · Oracle Forex</title>
  <meta name="description" content="Connectez-vous a votre espace Oracle Forex pour retrouver vos analyses Kronos.">
  <link rel="stylesheet" href="/assets/styles-nTlncI0E.css">
  <link rel="stylesheet" href="/assets/oracle-extras.css">
</head>
<body class="oracle-page auth-page">
  <nav class="oracle-nav">
    <div class="oracle-nav-inner">
      <a href="/" class="oracle-brand">
        <span class="oracle-logo">O</span>
        <span>ORACLE <span class="text-amber-neon">FOREX</span></span>
      </a>
      <div class="oracle-links">
        <a href="/">Accueil</a>
        <a href="/tester-gratuitement">Tester gratuitement</a>
        <a href="/signup">Inscription</a>
      </div>
    </div>
  </nav>

  <main class="oracle-main auth-main">
    <section class="auth-card">
      <p class="analysis-kicker">Espace membre</p>
      <h1 class="analysis-title">Connexion</h1>
      <p class="analysis-subtitle">Retrouvez votre dashboard, vos analyses et les prochains outils premium.</p>
      <form class="auth-form" data-auth-form="login">
        <label>Email<input name="email" type="email" autocomplete="email" required></label>
        <label>Mot de passe<input name="password" type="password" autocomplete="current-password" required></label>
        <button class="analysis-submit" type="submit">Se connecter</button>
        <p class="auth-message" data-auth-message></p>
      </form>
      <p class="auth-switch">Pas encore de compte ? <a href="/signup">Créer un compte</a></p>
    </section>
  </main>

  <script src="/assets/auth.js" defer></script>
  <script src="/assets/oracle-chatbot.js" defer></script>
</body>
</html>
